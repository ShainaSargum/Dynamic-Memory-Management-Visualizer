<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Filter UI</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .filter-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }
        .filter-section input, .filter-section select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex-grow: 1;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }
        .product-card h3 {
            margin: 0 0 10px;
            font-size: 1.1em;
        }
        .product-card p {
            margin: 5px 0;
            color: #666;
            font-size: 0.9em;
        }
        .product-card .price {
            font-size: 1.2em;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Product Filter</h1>
        <div class="filter-section">
            <input type="text" id="searchInput" placeholder="Search product..." onkeyup="filterProducts()">
            <select id="categoryFilter" onchange="filterProducts()">
                <option value="all">All Categories</option>
                <option value="electronics">Electronics</option>
                <option value="clothing">Clothing</option>
            </select>
            <select id="priceFilter" onchange="filterProducts()">
                <option value="all">All Prices</option>
                <option value="under500">Under ₹500</option>
                <option value="over500">Over ₹500</option>
            </select>
        </div>

        <div class="product-grid" id="productGrid">
            <!-- Product cards will be generated by JavaScript -->
        </div>
    </div>

    <script>
        // JavaScript can be integrated inside HTML using the <script> tag [1].
        const products = [
            { name: 'Phone', category: 'electronics', price: 1000 },
            { name: 'Headphones', category: 'electronics', price: 300 },
            { name: 'T-Shirt', category: 'clothing', price: 400 },
            { name: 'Jeans', category: 'clothing', price: 800 }
        ];

        function renderProducts(filteredProducts) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.classList.add('product-card');
                card.innerHTML = `
                    <h3>${product.name}</h3>
                    <p>Category: ${product.category}</p>
                    <p class="price">Price: ₹${product.price}</p>
                `;
                grid.appendChild(card);
            });
        }

        function filterProducts() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const priceRange = document.getElementById('priceFilter').value;

            let filtered = products.filter(product => {
                // Search filter
                if (!product.name.toLowerCase().includes(searchQuery)) {
                    return false;
                }
                // Category filter
                if (category !== 'all' && product.category !== category) {
                    return false;
                }
                // Price filter
                if (priceRange === 'under500' && product.price >= 500) {
                    return false;
                }
                if (priceRange === 'over500' && product.price < 500) {
                    return false;
                }
                return true;
            });

            renderProducts(filtered);
        }

        // Initial render
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts(products);
        });
    </script>

</body>
</html>
